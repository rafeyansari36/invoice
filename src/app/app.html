<div class="page">
  <header class="app-bar no-print">
    <h1><img class="app-mark" src="logo-mark.svg" alt="" /> Invoice Maker</h1>
    <nav class="app-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <lucide-icon name="file-text" [size]="18"></lucide-icon> Create
      </a>
      <a routerLink="/saved" routerLinkActive="active">
        <lucide-icon name="folder-open" [size]="18"></lucide-icon>
        Saved
        @if (savedCount().length) {
          <span class="nav-badge">{{ savedCount().length }}</span>
        }
      </a>
      @if (canInstall) {
        <button type="button" class="btn btn-install" (click)="installApp()">
          <lucide-icon name="download" [size]="18"></lucide-icon> Install
        </button>
      }
    </nav>
  </header>

  <router-outlet></router-outlet>

  @if (toastMessage()) {
    <div class="toast no-print" role="status">{{ toastMessage() }}</div>
  }
</div>
